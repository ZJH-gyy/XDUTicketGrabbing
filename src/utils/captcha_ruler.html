<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑块验证码 - {{timestamp}}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .image-comparison {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .image-box {
            flex: 1;
            min-width: 300px;
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .image-box h3 {
            margin-top: 0;
            color: #444;
        }
        img {
            max-width: 100%;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .instructions {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
            border-left: 5px solid #2196F3;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 8px 0;
        }
        .measure-guide {
            background: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 5px solid #ffb300;
        }
        .measure-guide img {
            max-width: 200px;
            margin: 10px;
            vertical-align: middle;
        }
        .input-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
        }
        .input-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #4CAF50;
            outline: none;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 5px 0 0;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 8px;
            display: none;
            border-left: 5px solid #4CAF50;
        }
        .copy-btn {
            background: #2196F3;
        }
        .copy-btn:hover {
            background: #1976D2;
        }
        .pixel-example {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .coordinate-hint {
            background: #e1f5fe;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>统一认证验证码工具</h1>

        <div class="image-box">
            <h3 id="image-title">示例</h3>
                <img id="captchaImage" src="example_captcha.png" alt="图片">
                <p id="image-hint"><small>输入：331</small></p>
        </div>
        
        <div class="input-section">         
            <div class="input-group">
                <input type="number" id="displacement" placeholder="请输入坐标值，例如：150">
            </div>
            
            <button id="getCaptchaBtn" onclick="get_captcha()">获取验证码</button>
            <button id="submitCaptchaBtn" onclick="submit_captcha()">提交</button>
        </div>
        
        <div class="instructions">
            <strong>📋 使用步骤：</strong>
            <ol>
                <li>点击<strong>获取验证码</strong>按钮，加载验证码</li>
                <li>输入滑块目标位置<strong>最左端</strong>对应的横坐标（输入尽可能精确的整数，有容错）</li>
                <li>查看目标位置对应的<strong>坐标值</strong></li>
                <li>在下方输入框中输入坐标值，点击<strong>登录</strong>按钮</li>
            </ol>
        </div>

    </div>
    
    <script>
        const captchaImg = document.getElementById('captchaImage');
        const imageTitle = document.getElementById('image-title');
        const imageHint = document.getElementById('image-hint');
        const displacementInput = document.getElementById('displacement');

        const getCaptchaBtn = document.getElementById('getCaptchaBtn');
        const submitCaptchaBtn = document.getElementById('submitCaptchaBtn'); 

        async function get_captcha() {
            captchaImg.src = '';
            imageTitle.textContent = "验证码";
            imageHint.textContent = "下方坐标表示像素距离";

            // 禁用按钮防止重复点击
            getCaptchaBtn.disabled = true;
            getCaptchaBtn.style.background = '#7a7a7a';

            try {
                // 发送请求到服务器获取验证码
                const response = await fetch('/get-captcha', { method: 'POST' });

                const result = await response.json();
            
                if (result.success) {
                    imageHint.textContent = result.message;

                    captchaImg.src = `/captcha_marked.png`;
                    
                    // 图片加载成功
                    captchaImg.onload = () => {
                        imageHint.textContent = '图片已加载，请输入缺口左侧坐标值';
                        console.log('✅ 验证码图片加载成功');
                    };
                    
                    // 图片加载失败
                    captchaImg.onerror = () => {
                        imageHint.textContent = '图片加载失败，请重试';
                        console.error('❌ 验证码图片加载失败');
                    };
                }
            } catch (error) {
                imageHint.textContent = '网络错误: ' + error.message;
            } finally {
                // 重新启用按钮
                getCaptchaBtn.disabled = false;
                getCaptchaBtn.style.background = '#4caf50';
            }
        }


        async function submit_captcha() {
            const displacement = parseInt(displacementInput.value);
            
            // 验证输入
            if (isNaN(displacement) || displacement < 0) {
                alert('请输入有效的坐标值（正整数）');
                displacementInput.focus();
                return;
            }

            // 禁用提交按钮
            submitCaptchaBtn.disabled = true;
            getCaptchaBtn.style.background = '#7a7a7a';

            try {
                // 发送验证码到服务器
                await fetch('/submit-captcha', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ displacement })
                });

                // 查询登录状态
                submitCaptchaBtn.textContent = '正在登录...';
                await new Promise(resolve => setTimeout(resolve, 3000)); // 等待3秒登录
                const statusResponse = await fetch('/login-status');
                const statusResult = await statusResponse.json();
                
                if (statusResult.loggedIn) {
                    alert("登录成功！");
                    
                } else {
                    alert("登录失败！请重试");
                }

                location.reload();
                       
            } catch (error) {
                alert('提交失败，请检查网络连接');
                location.reload();
                
            }
        }

        
        // 按Enter键触发提交
        document.getElementById('displacement').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submit_captcha();
            }
        });
        
        // 自动聚焦到输入框
        document.getElementById('displacement').focus();
    </script>
</body>
</html>
